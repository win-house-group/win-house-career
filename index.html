eriodic Reporting","zh_cn":"周期性回报"},"items":{"zh":["日：與主管每日溝通交流，回報當日進度（拜訪、商機、客訴）","月：KPI 認列資料、潛力客戶漏斗","季：漏斗轉化檢視、關係深耕憑證、展會 ROI","年：與主管定毛利目標、提出在地策略建議"],"en":["Daily: communicate with manager, report the day progress (visits, opportunities, complaints)","Monthly: KPI data, potential-customer funnel","Quarterly: funnel-conversion review, relationship evidence, exhibition ROI","Annually: set margin targets with manager; propose local strategy"],"zh_cn":["日：与主管每日沟通交流，回报当日进度（拜访、商机、客诉）","月：KPI 认列数据、潜力客户漏斗","季：漏斗转化查看、关系深耕凭证、展会 ROI","年：与主管定毛利目标、提出在地策略建议"]}}]},{"id":"global_bd","name":{"zh":"國際商務開發","en":"Global Business Development","zh_cn":"国际商务开发"},"version":"v12","color":"#C9A781","positioning":{"zh":"國際商務開發（Global Business Development），不駐外、不設攤，以 LinkedIn 線上開發及公司指派之展覽/講座為主管道，運用外語專長為國外終端客戶與參展商的對接窗口。負責開發潛力客戶、向前推進商機——在地無業務承接時可自行接洽，有承接對象時轉介交棒。角色本質為國際入口型 BD，價值在「開發潛力客戶 + 推進商機 + 當國外資源進門的窗口」。不背毛利、不列實體拜訪。","en":"Global Business Development (no overseas posting, no exhibition booth). Works primarily through LinkedIn online development and company-assigned exhibitions/seminars, leveraging foreign-language skills as the contact window for overseas end customers and exhibitors. Develops potential customers and advances opportunities — handling accounts directly when no local salesperson is available, handing off via referral when there is. Essence: gateway-type international BD; value lies in \"developing potential customers + advancing opportunities + serving as the entry window for overseas resources.\" Does not carry a gross-profit target; physical visits not counted.","zh_cn":"国际商务开发（Global Business Development），不驻外、不设摊，以 LinkedIn 在线开发及公司指派之展览/讲座为主管道，运用外语专长为国外终端客户与参展商的对接窗口。负责开发潜力客户、向前推进商机——在地无业务承接时可自行接洽，有承接对象时转介交棒。角色本质为国际入口型 BD，价值在「开发潜力客户 + 推进商机 + 当国外资源进门的窗口」。不背毛利、不列实体拜访。"},"authority":[{"item":{"zh":"報價／議價","en":"Quotation / Negotiation","zh_cn":"报价／议价"},"auth":{"zh":"可初步報價；正式議價與毛利條件須業務主管／承接業務核可","en":"May issue preliminary quotes; formal negotiation and margin terms require sales  FAE 支援客戶","en":"Leads technical advancement, supporting customers jointly with sales and principal FAE","zh_cn":"主导技术推进，偕同业务与原厂 FAE 支持客户"}},{"item":{"zh":"原廠資源","en":"Principal Resources","zh_cn":"原厂资源"},"desc":{"zh":"代表公司向原廠爭取降價、rebate、樣品、優先供貨","en":"Represents the company in securing cost-downs, rebates, samples, and priority supply from principals","zh_cn":"代表公司向原厂争取降价、rebate、样品、优先供货"}},{"item":{"zh":"費用","en":"Expenses","zh_cn":"费用"},"desc":{"zh":"推廣費、樣品費依核定額度，超額事前簽核","en":"Promotion and sample expenses per approved budget; over-budget requires prior sign-off","zh_cn":"推广费、样品费依核定额度，超额事前签核"}},{"item":{"zh":"不具權限","en":"No Authority Over","zh_cn":"不具权限"},"desc":{"zh":"品牌授權、信用額度核定、最終定價政策（屬總部）","en":"Brand authorization, credit-limit approval, final pricing policy (HQ-controlled)","zh_cn":"品牌授权、信用额度核定、最终定价政策（属总部）"}}],"overview":[{"cat":"primary","no":"①","name":{"zh":"品牌利潤創造","en":"Brand Profit Creation","zh_cn":"品牌利润创造"},"weight":20,"star":true},{"cat":"primary","no":"②","name":{"zh":"Design-in 進展","en":"Design-in Progress","zh_cn":"Design-in 进展"},"weight":20},{"cat":"primary","no":"③","name":{"zh":"重點客戶商機推進","en":"Key-Customer Opportunity Advancement","zh_cn":"重点客户商机推进"},"weight":15},{"cat":"primary","no":"④","name":{"zh":"原廠偕同","en":"Principal Joint Visits","zh_cn":"原厂偕同"},"weight":15},{"cat":"primary","no":"⑤","name":{"zh":"品牌教育訓練","en":"Brand Training","zh_cn":"品牌教育训练"},"weight":10},{"cat":"bonus","no":"➊","name":{"zh":"原廠關係深耕","en":"Principal Relationship Cultivation","zh_cn":"原厂关系深耕"},"weight":5},{"cat":"bonus","no":"➋","name":{"zh":"多系列滲透","en":"Multi-Series Penetration","zh_cn":"多系列渗透"},"weight":5},{"cat":"admin","no":"","name":{"zh":"主管評分","en":"Manager Evaluation","zh_cn":"主管评分"},"weight":10},{"cat":"admin","no":"","name":{"zh":"學習指標","en":"Learning Indicator","zh_cn":"学习指针"},"weight":10}],"scoring_principle":{"zh":"僅最高權重主指標（① 品牌利潤創造）有優秀加分（120% = 24 分），其餘達標即上限。所有品牌相關指標（①②③）均套用戰略品牌權重。戰略品牌權重（兩級制）：成熟品牌 ×1（TDK 網通既有料號等）／優先發展品牌 ×2（InvenSense、Akoustis、uPOL、詠業、鈺泰、TDK 車用工業新應用）。歸類由 PM 主管／Tim 年初核定，全年固定。","en":"Only the highest-weighted primary indicator (① Brand Profit Creation) carries an excellence bonus (120% = 24 pts); all others cap at target. All brand-related indicators (①②③) apply strategic brand weights. Strategic brand weights (two tiers): mature brands ×1 (existing TDK networking part numbers, etc.) / priority-development brands ×2 (InvenSense, Akoustis, uPOL, Yongye, YAGEO-Nuvoton, TDK automotive/industrial new applications). Classification is set annually by the PM lead / Tim and fixed for the year.","zh_cn":"仅最高权重主指针（① 品牌利润创造）有优秀加分（120% = 24 分），其余达标即上限。所有品牌相关指针（①②③）均套用战略品牌权重。战略品牌权重（两级制）：成熟品牌 ×1（TDK 网通既有料号等）／优先发展品牌 ×2（InvenSense、Akoustis、uPOL、咏业、钰泰、TDK 车用工业新应用）。归类由 PM 主管／Tim 年初核定，全年固定。"},"indicators":[{"no":"①","star":true,"name":{"zh":"品牌利潤創造","en":"Brand Profit Creation","zh_cn":"品牌利润创造"},"weight":20,"what":{"zh":"PM 向原廠爭取降價／rebate／優先供貨所創造的加權毛利增額","en":"Weighted incremental margin created by the PM securing cost-downs / rebates / priority supply from principals","zh_cn":"PM 向原厂争取降价／rebate／优先供货所创造的加权毛利增额"},"why":{"zh":"這是 PM 對品牌損益最直接的貢獻，也是 AI 不可取代的硬本事，故比重最高","en":"The PM's most direct contribution to brand P&L and an AI-irreplaceable hard skill, hence the highest weight","zh_cn":"这是 PM 对品牌损益最直接的贡献，也是 AI 不可取代的硬本事，故比重最高"},"who":{"zh":"PM 本人（ERP 撈毛利數據，加權目標含品牌權重）","en":"The PM (margin data pulled from ERP; weighted target includes brand weights)","zh_cn":"PM 本人（ERP 捞毛利数据，加权目标含品牌权重）"},"note":{"zh":"加權毛利達成率＝加權實際毛利 ÷ 加權目標毛利（優先發展品牌毛利 ×2 計入）。防刷：毛利增額須有原廠書面（報價、rebate 協議、cost down 通知）佐證，口頭不認列。","en":"Weighted margin achievement = weighted actual margin ÷ weighted target margin (priority-brand margin counted ×2). Anti-gaming: margin increments require written principal proof (quote, rebate agreement, cost-down notice); verbal claims not counted.","zh_cn":"加权毛利达成率＝加权实际毛利 ÷ 加权目标毛利（优先发展品牌毛利 ×2 计入）。防刷：毛利增额须有原厂书面（报价、rebate 协议、cost down 通知）佐证，口头不认列。"},"table":{"head":{"zh":["加權毛利達成率","得分"],"en":["Weighted Margin Achievement","Scor ads, FAE leads, ops leads, etc.). GM-level cross-functional managers are designed separately. Core principle: a manager's KPI sheet = the item-by-item aggregation of all subordinates' KPI sheets — same items and weights, with individual figures replaced by department Σ figures.","zh_cn":"适用所有「带人」的单一职能管理职（业务经理、业务协理、PM 主管、FAE 主管、营运主管等）。GM 等跨领域管理职另行设计。核心精神：主管 KPI 表 = 底下所有人员 KPI 表「逐项归并加总」，项目与权重与下属一致，个人数字换成部门 Σ 数字。"},"sections":[{"title":{"zh":"一、核心原則","en":"1. Core Principles","zh_cn":"一、核心原则"},"bullets":{"zh":["主管 KPI 表 = 底下所有人員 KPI 表「逐項歸併加總」，項目與權重與下屬一致，個人數字換成部門 Σ 數字。","採絕對值加總：達成率 = Σ實際 ÷ Σ目標（非各人達成率平均），大單貢獻自然主導結果。","主管不另設專屬結果指標、不加任何達成率係數。","主管只對部門總數字負責；內部如何分配、誰強誰弱不計入評分，達不到者自然淘汰。","一套規則涵蓋全公司單一職能管理職：下屬 KPI 表訂好，主管表自動生成，零額外維護成本。"],"en":["A manager's KPI sheet = item-by-item aggregation of all subordinates' KPI sheets — same items and weights, individual figures replaced by department Σ.","Absolute-value aggregation: achievement = ΣActual ÷ ΣTarget (not the average of individual rates); large-deal contributions naturally dominate.","Managers add no exclusive result indicators and no achievement-rate coefficients.","Managers are accountable only for department totals; internal distribution and who is strong or weak do not count toward scoring — underperformers are weeded out naturally.","One ruleset covers all single-function managers company-wide: once subordinate sheets are set, the manager's sheet auto-generates at zero maintenance cost."],"zh_cn":["主管 KPI 表 = 底下所有人员 KPI 表「逐项归并加总」，项目与权重与下属一致，个人数字换成部门 Σ 数字。","采绝对值加总：达成率 = Σ实际 ÷ Σ目标（非各人达成率平均），大单贡献自然主导结果。","主管不另设专属结果指针、不加任何达成率系数。","主管只对部门总数字负责；内部如何分配、谁强谁弱不计入评分，达不到者自然淘汰。","一套规则涵盖全公司单一职能管理职：下属 KPI 表订好，主管表自动生成，零额外维护成本。"]}},{"title":{"zh":"二、目標分配方向（由上而下分配、加總向上驗證）","en":"2. Target Allocation (top-down allocation, bottom-up validation)","zh_cn":"二、目标分配方向（由上而下分配、加总向上验证）"},"bullets":{"zh":["公司先給部門總目標（例：二部年度毛利 1,700 萬）。","主管拿到部門總目標後，自行往下拆給每位下屬（此為主管管理權責，公司不干涉分配方式）。","下屬目標加總「應等於」主管（部門）目標——恆等式須成立。","與主管討論目標時，談的是「部門總目標」；底下如何分配，是主管的事。"],"en":["The company first sets the department total target (e.g., Division 2 annual margin NT$17M).","The manager then splits it down to each subordinate (a management prerogative; the company does not interfere with distribution).","Subordinate targets summed \"should equal\" the manager's (department) target — the identity must hold.","Discussions with the manager concern the \"department total\"; internal distribution is the manager's business."],"zh_cn":["公司先给部门总目标（例：二部年度毛利 1,700 万）。","主管拿到部门总目标后，自行往下拆给每位下属（此为主管管理权责，公司不干涉分配方式）。","下属目标加总「应等于」主管（部门）目标——恒等式须成立。","与主管讨论目标时，谈的是「部门总目标」；底下如何分配，是主管的事。"]}}],"structure_table":{"head":{"zh":["區塊","權重","上限規則"],"en":["Block","Weight","Cap Rule"],"zh_cn":["区块","权重","上限规则"]},"rows":[{"zh":["5 核心項目（加總）","80%","主指標可破百（封頂120%），其餘各封頂100%"],"en":["5 core items (aggregated)","80%","Primary may exceed 100% (cap 120%); others cap at 100%"],"zh_cn":["5 核心项目（加总）","80%","主指针可破百（封顶120%），其余各封顶100%"]},{"zh":["加分項 ×2（加總）","+5% / +5%","各封頂 +5%，未達標 0，不倒扣"],"en":["Bonus ×2 (aggregated)","+5% / +5%","Each caps at +5%; below target 0; no deduction"],"zh_cn":["加分项 ×2（加总）","+5% / +5%","各封顶 +5%，未达标 0，不倒扣"]},{"zh":["主管評核（個人）","10%","封頂 100%，不加總"],"en":["Manager evaluation (individual)","10%","Caps at 100%, not aggregated"],"zh_cn":["主管评核（个人）","10%","封顶 100%，不加总"]},{"zh":["學習成長（個人）","10%","封頂 100%，不加總"],"en":["Learning growth (individual)","10%","Caps at 100%, not aggregated"],"zh_cn":["学习成长（个人）","10%","封顶 100%，不加总"]},{"zh":["合計","110%","理論最高 120%"],"en":["Total","110%","Theoretical max 120%"],"zh_cn":["合计","110%","理论最高 120%"]}]},"formula":{"title":{"zh":"計分公式","en":"Scoring Formulas","zh_cn":"计分公式"},"bullets":{"zh":["各核心加總項：得分 = 權重 × min(Σ實際 ÷ Σ目標, 上限)。","僅最高權重之主指標可超過 100%（封頂 120%），其餘各項封頂 100%。","加分項：Σ達標數 ÷ Σ目標數，達標各 +5%，不倒扣。","主管評核：10% ×（上級評分 ÷ 100）。學習成長：10% ×（達成 ÷ 目標）。"],"en":["Each core aggregated item: score = weight × min(ΣActual ÷ ΣTarget, cap).","Only the highest-weighted primary may exceed 100% (cap 120%); all others cap at 100%.","Bonus items: ΣAchieved ÷ ΣTarget; +5% each on meeting target; no deduction.","Manager evaluation: 10% × (supervisor score ÷ 100). Learning: 10% × (achieved ÷ target)."],"zh_cn":["各核心加总项：得分 = 权重 × min(Σ实际 ÷ Σ目标, 上限)。","仅最高权重之主指针可超过 100%（封顶 120%），其余各项封顶 100%。","加分项：Σ达标数 ÷ Σ目标数，达标各 +5%，不倒扣。","主管评核：10% ×（上级评分 ÷ 100）。学习成长：10% ×（达成 ÷ 目标）。"]}},"mixed_dept":{"title":{"zh":"混編部門歸併規則（方式 B）","en":"Mixed-Department Aggregation (Method B)","zh_cn":"混编部门归并规则（方式 B）"},"bullets":{"zh":["跨職類共通指標（如毛利、Design-in）→ 歸併成一項，全部相關人員 Σ實際÷Σ目標。","特定職類專有指標（如海外/遠端新客開發、駐點拓展）→ 歸併成獨立項目，同樣 Σ實際÷Σ目標。","混編主管項目數可能超過 5 項（約 5–7 項），屬正常；權重依歸併後重要性重新分配，核心總和維持 80%。","純單一職類部門：歸併後等同標準 5 核心，結果一致。"],"en":["Cross-type common indicators (e.g., margin, Design-in) → merged into one item; ΣActual÷ΣTarget across all relevant staff.","Type-specific indicators (e.g., overseas/remote new-customer development, on-site expansion) → merged into a standalone item, also ΣActual÷ΣTarget.","A mixed manager may have more than 5 items (about 5–7) — this is normal; weights are reallocated by post-merge importance, with the core total staying at 80%.","Pure single-type departments: after merging, equivalent to the standard 5 core items — results identical."],"zh_cn":["跨职类共通指针（如毛利、Design-in）→ 归并成一项，全部相关人员 Σ实际÷Σ目标。","特定职类专有指针（如海外/远程新客开发、驻点拓展）→ 归并成独立项目，同样 Σ实际÷Σ目标。","混编主管项目数可能超过 5 项（约 5–7 项），属正常；权重依归并后重要性重新分配，核心总和维持 80%。","纯单一职类部门：归并后等同标准 5 核心，结果一致。"]}},"mapping_table":{"title":{"zh":"各管理職套用對照","en":"Application by Manager Type","zh_cn":"各管理职套用对照"},"head":{"zh":["管理職","加總對象","主指標範例"],"en":["Manager Type","Aggregation Target","Primary Example"],"zh_cn":["管理职","加总对象","主指针范例"]},"rows":[{"zh":["業務經理 / 協理","底下業務","部門毛利加總"],"en":["Sales Manager / Director","Subordinate sales","Department margin aggregate"],"zh_cn":["业务经理 / 协理","底下业务","部门毛利加总"]},{"zh":["PM 主管","底下 PM","品牌線毛利加總"],"en":["PM Lead","Subordinate PMs","Brand-line margin aggregate"],"zh_cn":["PM 主管","底下 PM","品牌线毛利加总"]},{"zh":["FAE 主管","底下 FAE","Design-in 件數加總"],"en":["FAE Lead","Subordinate FAEs","Design-in count aggregate"],"zh_cn":["FAE 主管","底下 FAE","Design-in 件数加总"]},{"zh":["營運主管","底下營運人員","營運型指標加總"],"en":["Ops Lead","Subordinate ops staff","Ops indicator aggregate"],"zh_cn":["营运主管","底下营运人员","营运型指针加总"]}]},"example":{"title":{"zh":"實例：業務主管（單一職類部門 5 人，毛利加總）","en":"Example: Sales Manager (single-type dept, 5 people, margin aggregate)","zh_cn":"实例：业务主管（单一职类部门 5 人，毛利加总）"},"head":{"zh":["業務","目標毛利","實際毛利"],"en":["Salesperson","Target Margin","Actual Margin"],"zh_cn":["业务","目标毛利","实际毛利"]},"rows":[{"zh":["A","500萬","525萬"],"en":["A","5.00M","5.25M"],"zh_cn":["A","500万","525万"]},{"zh":["B","400萬","392萬"],"en":["B","4.00M","3.92M"],"zh_cn":["B","400万","392万"]},{"zh":["C","300萬","276萬"],"en":["C","3.00M","2.76M"],"zh_cn":["C","300万","276万"]},{"zh":["D","300萬","264萬"],"en":["D","3.00M","2.64M"],"zh_cn":["D","300万","264万"]},{"zh":["E","200萬","140萬"],"en":["E","2.00M","1.40M"],"zh_cn":["E","200万","140万"]},{"zh":["加總","1,700萬","1,597萬"],"en":["Total","17.00M","15.97M"],"zh_cn":["加总","1,700万","1,597万"]}],"note":{"zh":"主管毛利達成率 = 1,597 ÷ 1,700 = 94.0%（非各人達成率平均 90.6%）。","en":"Manager margin achievement = 1,597 ÷ 1,700 = 94.0% (not the 90.6% average of individual rates).","zh_cn":"主管毛利达成率 = 1,597 ÷ 1,700 = 94.0%（非各人达成率平均 90.6%）。"}},"exception":{"title":{"zh":"例外：GM 等跨領域管理職","en":"Exception: GM-level Cross-Functional Managers","zh_cn":"例外：GM 等跨领域管理职"},"bullets":{"zh":["GM 管轄異質職能（業務+PM+FAE+營運），指標無法歸併加總，且 GM 須對淨利、費用、人均產值、組織建設、跨部門綜效負責——這些下屬層級不存在。","因此 GM（集團 GM、區域 GM）不適用本通則，採「部門結果加總 + GM 專屬損益/組織指標」混合制，另行設計。"],"en":["GMs oversee heterogeneous functions (sales + PM + FAE + ops); indicators cannot be aggregated, and GMs are accountable for net profit, expenses, per-capita productivity, organization building, and cross-department synergy — which do not exist at the subordinate level.","Therefore GMs (group GM, regional GM) do not follow this ruleset; they use a hybrid of \"department-result aggregation + GM-exclusive P&L/organization indicators,\" designed separately."],"zh_cn":["GM 管辖异质职能（业务+PM+FAE+营运），指针无法归并加总，且 GM 须对净利、费用、人均产值、组织建设、跨部门综效负责——这些下属层级不存在。","因此 GM（集团 GM、区域 GM）不适用本通则，采「部门结果加总 + GM 专属损益/组织指针」混合制，另行设计。"]}},"tradeoff":{"title":{"zh":"設計取捨備註","en":"Design Trade-off Notes","zh_cn":"设计取舍备注"},"bullets":{"zh":["純粹加總的兩個已知特性，公司已確認接受：(1) 主管專屬職責（育才、原廠偕同等）不直接計分，僅透過下屬數字間接反映；(2) 強將可掩蓋弱兵，但部門總數字達標即視為主管達成。","此設計符合「精兵 + 極簡」原則，與既有 KPI 框架（5核心80%+加分10%+主管評核10%+學習10%=110%）完全相容。"],"en":["Two known characteristics of pure aggregation, accepted by the company: (1) manager-exclusive duties (mentoring, principal joint visits, etc.) are not scored directly, only reflected indirectly via subordinate figures; (2) strong performers can mask weak ones, but meeting the department total counts as the manager achieving target.","This design fits the \"elite-team + minimalism\" principle and is fully compatible with the existing KPI framework (5 core 80% + bonus 10% + manager eval 10% + learning 10% = 110%)."],"zh_cn":["纯粹加总的两个已知特性，公司已确认接受：(1) 主管专属职责（育才、原厂偕同等）不直接计分，仅通过下属数字间接反映；(2) 强将可掩盖弱兵，但部门总数字达标即视为主管达成。","此设计符合「精兵 + 极简」原则，与既有 KPI 框架（5核心80%+加分10%+主管评核10%+学习10%=110%）完全兼容。"]}}}]};

    purchasing: L({
      zh_tw: '採購',
      zh_cn: '采购',
      en: 'Purchasing'
    }),
    finance: L({
      zh_tw: '財務出納',
      zh_cn: '财务出纳',
      en: 'Finance'
    }),
    hr: 'HR',
    mis: 'MIS',
    warehouse: L({
      zh_tw: '倉管總務',
      zh_cn: '仓管总务',
      en: 'Warehouse & GA'
    })
  };
  const pillars = [['scope', L({
    zh_tw: '職權範圍',
    zh_cn: '职权范围',
    en: 'Scope'
  })], ['direction', L({
    zh_tw: '方向判斷',
    zh_cn: '方向判断',
    en: 'Direction'
  })], ['collaboration', L({
    zh_tw: '協作',
    zh_cn: '协作',
    en: 'Collaboration'
  })], ['execution', L({
    zh_tw: '執行專業',
    zh_cn: '执行专业',
    en: 'Execution'
  })], ['kpi', L({
    zh_tw: 'KPI 方向',
    zh_cn: 'KPI 方向',
    en: 'KPI Focus'
  })], ['promotion', L({
    zh_tw: '升等條件',
    zh_cn: '升等条件',
    en: 'Promotion'
  })]];
  const levelOrder = ['L1', 'L2', 'L3', 'L4', 'L5', 'L6', 'L7', 'L8', 'L9', 'L10', 'L11', 'L12'];
  const dumpLevels = (levelsObj, heading) => {
    out.push(`\n### ${heading}\n`);
    levelOrder.forEach(lvId => {
      const lv = levelsObj[lvId];
      if (!lv) return;
      out.push(`\n**${lvId}**`);
      pillars.forEach(([pid, pname]) => {
        const items = Larr(lv[pid]);
        if (items.length) {
          out.push(`- ${pname}：${items.join('；')}`);
        }
      });
    });
  };
  ['sales', 'pm', 'fae', 'ops'].forEach(rid => {
    const rd = DATA[rid];
    if (!rd) return;
    if (rd.subtypes) {
      Object.keys(rd.subtypes).forEach(sub => {
        dumpLevels(rd.subtypes[sub], `${roleNames[rid]} · ${subNames[sub] || sub}`);
      });
    } else {
      dumpLevels(rd, roleNames[rid]);
    }
  });

  // ── Part 2：職務說明書 ──
  const p2 = lang === 'en' ? 'Part 2 · Job Descriptions' : lang === 'zh_cn' ? '第二部分 · 职务说明书' : '第二部分 · 職務說明書';
  out.push(`\n\n---\n\n## ${p2}\n`);
  KPI.roles.forEach(role => {
    out.push(`\n### ${L(role.name)} ${role.version || ''}\n`);
    if (role.positioning) out.push(`\n${L(role.positioning)}\n`);

    // 規則型文件（管理職）
    if (role.is_rule) {
      (role.sections || []).forEach(sec => {
        out.push(`\n**${L(sec.title)}**`);
        Larr(sec.bullets).forEach(b => out.push(`- ${b}`));
      });
      if (role.structure_table) {
        out.push(`\n**${lang === 'en' ? 'Overall Structure' : '總體結構'}**`);
        dumpTable(role.structure_table);
      }
      if (role.formula) {
        out.push(`\n**${L(role.formula.title)}**`);
        Larr(role.formula.bullets).forEach(b => out.push(`- ${b}`));
      }
      if (role.mixed_dept) {
        out.push(`\n**${L(role.mixed_dept.title)}**`);
        Larr(role.mixed_dept.bullets).forEach(b => out.push(`- ${b}`));
      }
      if (role.mapping_table) {
        out.push(`\n**${L(role.mapping_table.title)}**`);
        dumpTable(role.mapping_table);
      }
      if (role.example) {
        out.push(`\n**${L(role.example.title)}**`);
        dumpTable(role.example);
        if (role.example.note) out.push(`\n_${L(role.example.note)}_`);
      }
      if (role.exception) {
        out.push(`\n**${L(role.exception.title)}**`);
        Larr(role.exception.bullets).forEach(b => out.push(`- ${b}`));
      }
      if (role.tradeoff) {
        out.push(`\n**${L(role.tradeoff.title)}**`);
        Larr(role.tradeoff.bullets).forEach(b => out.push(`- ${b}`));
      }
      return;
    }

    // 職權範圍
    if (role.authority) {
      out.push(`\n**${lang === 'en' ? 'Scope of Authority' : lang === 'zh_cn' ? '职权范围' : '職權範圍'}**`);
      role.authority.forEach(a => out.push(`- ${L(a.item)}：${L(a.desc)}`));
    }
    // KPI 總覽
    if (role.overview) {
      out.push(`\n**${lang === 'en' ? 'KPI Overview' : 'KPI 總覽'}**`);
      role.overview.forEach(o => {
        const cat = o.cat === 'primary' ? lang === 'en' ? 'Primary' : '主指標' : o.cat === 'bonus' ? lang === 'en' ? 'Bonus' : '加分' : lang === 'en' ? 'Admin' : '行政';
        out.push(`- [${cat}] ${o.no || ''} ${L(o.name)}${o.star ? ' ⭐' : ''} — ${o.cat === 'bonus' ? '+' : ''}${o.weight}%`);
      });
      if (role.scoring_principle) out.push(`\n_${L(role.scoring_principle)}_`);
    }
    // 各指標
    (role.indicators || []).forEach(ind => {
      out.push(`\n**${ind.no} ${L(ind.name)}${ind.star ? ' ⭐' : ''}（${ind.bonus ? '+' : ''}${ind.weight}%）**`);
      if (ind.what) out.push(`- ${lang === 'en' ? 'What' : '是什麼'}：${L(ind.what)}`);
      if (ind.why) out.push(`- ${lang === 'en' ? 'Why' : '為什麼'}：${L(ind.why)}`);
      if (ind.who) out.push(`- ${lang === 'en' ? 'Who' : '誰來做'}：${L(ind.who)}`);
      if (ind.when) out.push(`- ${lang === 'en' ? 'When' : '何時做'}：${L(ind.when)}`);
      if (ind.table) dumpTable(ind.table);
      if (ind.table2) dumpTable(ind.table2);
      if (ind.note) out.push(`\n_${L(ind.note)}_`);
    });
    // 行政
    if (role.admin && role.admin.length) {
      out.push(`\n**${lang === 'en' ? 'Administrative' : '行政'}**`);
      role.admin.forEach(item => {
        out.push(`\n_${L(item.name)}${item.weight ? ` (${item.weight}%)` : ''}_`);
        if (item.what) out.push(`${L(item.what)}`);
        if (item.table) dumpTable(item.table);
        if (item.note) out.push(`_${L(item.note)}_`);
      });
    }
    // 必備能力
    if (role.competencies) {
      out.push(`\n**${lang === 'en' ? 'Required Competencies' : '必備能力'}**`);
      if (role.competencies.core) {
        out.push(`\n_${lang === 'en' ? 'Core' : '核心必備'}_`);
        Larr(role.competencies.core).forEach(b => out.push(`- ${b}`));
      }
      if (role.competencies.advanced) {
        out.push(`\n_${lang === 'en' ? 'Advanced' : '進階'}_`);
        Larr(role.competencies.advanced).forEach(b => out.push(`- ${b}`));
      }
    }
    // 工作內容
    if (role.work_content) {
      out.push(`\n**${lang === 'en' ? 'Work Content' : '工作內容'}**`);
      role.work_content.forEach(wg => {
        const gname = wg.group && typeof wg.group === 'object' ? L(wg.group) : wg.group;
        out.push(`\n_${gname}_`);
        Larr(wg.items).forEach(b => out.push(`- ${b}`));
      });
    }
  });
  function dumpTable(tbl) {
    if (!tbl || !tbl.head) return;
    const head = tbl.head[lang] || tbl.head.zh || tbl.head.en;
    if (!head) return;
    out.push('');
    out.push('| ' + head.join(' | ') + ' |');
    out.push('| ' + head.map(() => '---').join(' | ') + ' |');
    (tbl.rows || []).forEach(r => {
      const cells = r[lang] || r.zh || r.en;
      if (cells) out.push('| ' + cells.join(' | ') + ' |');
    });
    out.push('');
  }
  return out.join('\n');
}
function downloadMarkdown(DATA, KPI, lang) {
  const md = buildMarkdown(DATA, KPI, lang);
  const blob = new Blob([md], {
    type: 'text/markdown;charset=utf-8'
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const suffix = lang === 'en' ? 'EN' : lang === 'zh_cn' ? 'SC' : 'TC';
  a.href = url;
  a.download = `WIN-HOUSE_職級地圖_職務說明書_${suffix}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
